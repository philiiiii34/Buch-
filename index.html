<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bibliothek">
<title>Meine Bibliothek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c10;--s1:#14141a;--s2:#1c1c24;--s3:#222230;
  --b1:#2a2a38;--b2:#363648;
  --gold:#c8a96e;--pur:#7c6fcd;--grn:#5cb88a;--blu:#5c8fe0;--red:#e05c5c;
  --t1:#e8e6f0;--t2:#9896a8;--t3:#5a586a;
  --r:14px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:"DM Sans",sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ── HEADER ── */
.hdr{padding:calc(44px + var(–st)) 16px 12px;background:rgba(12,12,16,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(–b1);flex-shrink:0;}
.htop{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.logo{font-family:“Playfair Display”,serif;font-size:21px;color:var(–gold);flex:1;letter-spacing:-.3px;}
.pill{background:var(–s2);border:1px solid var(–b1);border-radius:20px;padding:4px 10px;font-size:11px;color:var(–t2);}
.pill b{color:var(–gold);}
.sw{position:relative;}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(–t3);font-size:15px;pointer-events:none;}
.si{width:100%;background:var(–s2);border:1px solid var(–b1);border-radius:12px;padding:10px 36px 10px 38px;color:var(–t1);font-size:15px;font-family:“DM Sans”,sans-serif;outline:none;transition:border-color .2s;}
.si:focus{border-color:var(–gold);}
.sx{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(–b1);border:none;color:var(–t2);width:20px;height:20px;border-radius:50%;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.sx.v{display:flex;}

/* ── FILTER STRIP ── */
.fs{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.fs::-webkit-scrollbar{display:none;}
.fb{white-space:nowrap;background:var(–s1);border:1px solid var(–b1);border-radius:20px;padding:5px 12px;font-size:11.5px;font-family:“DM Sans”,sans-serif;color:var(–t2);cursor:pointer;flex-shrink:0;}
.fb.on{background:var(–gold);border-color:var(–gold);color:#000;font-weight:500;}

/* ── STATUS TABS ── */
.tabs{display:flex;border-bottom:1px solid var(–b1);flex-shrink:0;padding:0 8px;}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:11px;font-weight:500;color:var(–t3);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:3px;transition:color .2s,border-color .2s;}
.tab.on{color:var(–gold);border-bottom-color:var(–gold);}
.tn{background:var(–s2);border-radius:10px;padding:1px 5px;font-size:10px;}
.tab.on .tn{background:var(–gold);color:#000;}

/* ── LIST ── */
.lw{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px calc(76px + var(–sb));scrollbar-width:none;}
.lw::-webkit-scrollbar{display:none;}

/* ── BOOK CARD ── */
.bc{background:var(–s1);border:1px solid var(–b1);border-radius:var(–r);margin-bottom:8px;cursor:pointer;overflow:hidden;transition:border-color .15s;}
.bc:active{opacity:.88;}
.bc.sr{border-left:3px solid var(–grn);}
.bc.sg{border-left:3px solid var(–gold);}
.bc.sw2{border-left:3px solid var(–blu);}
.bc.cst{border-left:3px solid var(–pur);}

/* collapsed row */
.cr{display:flex;gap:10px;padding:10px 12px;}
.cv{width:52px;height:76px;border-radius:7px;background:var(–s2);border:1px solid var(–b1);flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.cv img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.cv img.ld{display:block;}
.cvph{font-size:22px;color:var(–t3);}
.ci{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.ct{font-family:“Playfair Display”,serif;font-size:14px;line-height:1.3;color:var(–t1);}
.ca{font-size:11.5px;color:var(–t2);margin-top:3px;}
.cbdg{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.bdg{font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid;font-weight:500;}
.dg{background:rgba(124,111,205,.15);border-color:rgba(124,111,205,.4);color:#a09add;}
.da{background:rgba(224,92,92,.15);border-color:rgba(224,92,92,.4);color:#e08080;}
.db{background:rgba(200,169,110,.15);border-color:rgba(200,169,110,.4);color:var(–gold);}
.dx{background:rgba(224,92,92,.2);border-color:rgba(224,92,92,.5);color:#e09090;}
.dp{background:rgba(124,111,205,.15);border-color:rgba(124,111,205,.4);color:#a09add;}
.csi{font-size:17px;flex-shrink:0;align-self:flex-start;padding-top:2px;}
.cst2{display:flex;gap:1px;margin-top:5px;}
.cstar{font-size:11px;color:var(–t3);}
.cstar.on{color:#f5c518;}

/* ── EXPANDED ── */
.cex{display:none;padding:0 12px 14px;}
.bc.exp .cex{display:block;}
.bc.exp .ct{white-space:normal;}

.exrow{display:flex;gap:12px;margin-bottom:14px;}
.excv{width:88px;height:128px;border-radius:8px;background:var(–s2);border:1px solid var(–b1);flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.excv img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.excv img.ld{display:block;}
.excvph{font-size:28px;color:var(–t3);}
.exm{flex:1;display:flex;flex-direction:column;gap:6px;}
.emr{font-size:12px;color:var(–t2);}
.emr b{color:var(–t1);}
.exstars{display:flex;gap:4px;cursor:pointer;margin-top:2px;}
.exstar{font-size:24px;color:var(–t3);-webkit-user-select:none;user-select:none;}
.exstar.on{color:#f5c518;}

.edesc{font-size:13px;color:var(–t2);line-height:1.7;margin-bottom:10px;}
.ewhy{font-size:12px;color:var(–gold);font-style:italic;line-height:1.5;padding:8px 10px;background:rgba(200,169,110,.08);border-radius:8px;border:1px solid rgba(200,169,110,.15);margin-bottom:10px;}

.acts{display:flex;gap:6px;}
.ab{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(–b1);background:var(–s2);color:var(–t2);font-size:11.5px;font-family:“DM Sans”,sans-serif;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .15s;}
.ab.r{border-color:rgba(92,184,138,.4);color:var(–grn);}
.ab.r.on{background:var(–grn);color:#000;border-color:var(–grn);}
.ab.g{border-color:rgba(200,169,110,.4);color:var(–gold);}
.ab.g.on{background:var(–gold);color:#000;border-color:var(–gold);}
.ab.b{border-color:rgba(92,143,224,.4);color:var(–blu);}
.ab.b.on{background:var(–blu);color:#fff;border-color:var(–blu);}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(80px + var(–sb));scrollbar-width:none;}
.view::-webkit-scrollbar{display:none;}
.view.on{display:block;}
.vt{font-family:“Playfair Display”,serif;font-size:20px;color:var(–t1);margin-bottom:16px;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,16,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(–b1);display:flex;padding:8px 0 calc(8px + var(–sb));z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;cursor:pointer;color:var(–t3);background:none;border:none;font-family:“DM Sans”,sans-serif;transition:color .15s;}
.nb.on{color:var(–gold);}
.ni{font-size:22px;}
.nl{font-size:10px;font-weight:500;}

/* ── MODAL ── */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;align-items:flex-end;}
.ovl.on{display:flex;}
.mdl{background:var(–s1);border:1px solid var(–b1);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(20px + var(–sb));animation:sup .28s ease;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;background:var(–b1);border-radius:2px;margin:0 auto 18px;}
.mt{font-family:“Playfair Display”,serif;font-size:19px;color:var(–gold);margin-bottom:16px;}

/* Google search in modal */
.gw{position:relative;margin-bottom:8px;}
.gico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(–t3);pointer-events:none;}
.gi{width:100%;background:var(–s2);border:1px solid var(–b1);border-radius:12px;padding:12px 40px 12px 38px;color:var(–t1);font-size:16px;font-family:“DM Sans”,sans-serif;outline:none;transition:border-color .2s;}
.gi:focus{border-color:var(–gold);}
.gsp{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(–t3);opacity:0;transition:opacity .2s;}
.gsp.v{opacity:1;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.gdrop{background:var(–s2);border:1px solid var(–b1);border-radius:12px;max-height:260px;overflow-y:auto;margin-bottom:12px;display:none;scrollbar-width:none;}
.gdrop::-webkit-scrollbar{display:none;}
.gdrop.on{display:block;}
.gitem{display:flex;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(–b1);transition:background .1s;align-items:center;}
.gitem:last-child{border-bottom:none;}
.gitem:active{background:var(–s3);}
.gicover{width:36px;height:52px;border-radius:4px;background:var(–s1);border:1px solid var(–b1);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(–t3);}
.gicover img{width:100%;height:100%;object-fit:cover;display:block;}
.giinfo{flex:1;min-width:0;}
.git{font-size:13px;font-weight:500;color:var(–t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gim{font-size:11px;color:var(–t2);margin-top:2px;}
.gis{font-size:10px;margin-top:2px;}
.gis-local{color:var(–gold);}
.gis-google{color:var(–pur);}
.gno{text-align:center;padding:16px;font-size:13px;color:var(–t3);}
.dsec{font-size:10px;color:var(–t3);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px 2px;}

/* Form */
.dvd{text-align:center;color:var(–t3);font-size:12px;margin:12px 0;position:relative;}
.dvd::before,.dvd::after{content:””;position:absolute;top:50%;width:44%;height:1px;background:var(–b1);}
.dvd::before{left:0}.dvd::after{right:0}
.fg{margin-bottom:12px;}
.fl{font-size:11px;color:var(–t2);margin-bottom:5px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.6px;}
.fi,.fsel{width:100%;background:var(–s2);border:1px solid var(–b1);border-radius:10px;padding:11px 13px;color:var(–t1);font-size:15px;font-family:“DM Sans”,sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.fi:focus,.fsel:focus{border-color:var(–gold);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fsel option{background:var(–s1);}
.stp{display:flex;gap:6px;margin-top:4px;}
.spstar{font-size:30px;color:var(–t3);cursor:pointer;-webkit-user-select:none;user-select:none;}
.spstar.on{color:#f5c518;}
.sbtn{width:100%;background:var(–gold);border:none;border-radius:12px;padding:14px;color:#000;font-size:15px;font-weight:600;font-family:“DM Sans”,sans-serif;cursor:pointer;margin-top:6px;}
.sbtn:active{opacity:.8;}
.cbtn{width:100%;background:transparent;border:1px solid var(–b1);border-radius:12px;padding:12px;color:var(–t2);font-size:14px;font-family:“DM Sans”,sans-serif;cursor:pointer;margin-top:6px;}

/* ── RECS ── */
.rsec{margin-bottom:22px;}
.rh{font-family:“Playfair Display”,serif;font-size:16px;color:var(–gold);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(–b1);}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.sc{background:var(–s1);border:1px solid var(–b1);border-radius:var(–r);padding:14px;text-align:center;}
.scn{font-family:“Playfair Display”,serif;font-size:30px;}
.scl{font-size:11.5px;color:var(–t2);margin-top:3px;}
.gbar{margin-bottom:10px;}
.gbl{font-size:12px;color:var(–t2);margin-bottom:3px;display:flex;justify-content:space-between;}
.gbt{background:var(–s2);border-radius:4px;height:5px;overflow:hidden;}
.gbf{height:100%;background:linear-gradient(90deg,var(–pur),var(–gold));border-radius:4px;transition:width .9s;}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:50px 20px;color:var(–t3);}
.emico{font-size:44px;margin-bottom:10px;}
.ldg{display:flex;align-items:center;justify-content:center;height:180px;color:var(–t3);font-size:13px;gap:8px;}
.lspin{display:inline-block;animation:spin 1s linear infinite;}

/* ── TOAST ── */
.toast{position:fixed;top:calc(56px + var(–st));left:50%;transform:translateX(-50%) translateY(-70px);background:var(–s2);border:1px solid var(–b1);border-radius:20px;padding:9px 18px;font-size:13px;color:var(–t1);z-index:500;transition:transform .28s ease;white-space:nowrap;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,.5);}
.toast.on{transform:translateX(-50%) translateY(0);}
</style>

</head>
<body>
<div id="app">

<div class="hdr">
  <div class="htop">
    <div class="logo">📚 Meine Bibliothek</div>
    <div class="pill">Gelesen <b id="cr">0</b></div>
    <div class="pill">Lese <b id="cg">0</b></div>
  </div>
  <div class="sw">
    <span class="sico">🔍</span>
    <input class="si" id="si" type="search" placeholder="Titel, Autor, Genre …" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="sx" id="sx">✕</button>
  </div>
</div>

<div class="fs" id="fstrip"></div>

<div class="tabs" id="tabs">
  <div class="tab on" data-tab="all">Alle <span class="tn" id="tn-all">668</span></div>
  <div class="tab" data-tab="want">Merkliste <span class="tn" id="tn-want">0</span></div>
  <div class="tab" data-tab="reading">Aktuell <span class="tn" id="tn-reading">0</span></div>
  <div class="tab" data-tab="read">Gelesen <span class="tn" id="tn-read">0</span></div>
</div>

<div class="lw" id="lw"><div class="ldg"><span class="lspin">⟳</span> Lade …</div></div>
<div class="view" id="vR"></div>
<div class="view" id="vS"></div>

<nav class="bnav">
  <button class="nb on" id="nb-list" onclick="sv('list')"><span class="ni">📖</span><span class="nl">Bibliothek</span></button>
  <button class="nb" id="nb-recs" onclick="sv('recs')"><span class="ni">✨</span><span class="nl">Für dich</span></button>
  <button class="nb" id="nb-add" onclick="openAdd()"><span class="ni">＋</span><span class="nl">Hinzufügen</span></button>
  <button class="nb" id="nb-stats" onclick="sv('stats')"><span class="ni">📊</span><span class="nl">Statistik</span></button>
</nav>
</div>

<!-- ADD MODAL -->

<div class="ovl" id="ovl" onclick="bgc(event)">
 <div class="mdl">
  <div class="mh"></div>
  <div class="mt">Buch hinzufügen</div>
  <div class="gw">
    <span class="gico">🔍</span>
    <input class="gi" id="gi" placeholder="Titel oder Autor suchen …" autocomplete="off" spellcheck="false">
    <span class="gsp" id="gspn">⟳</span>
  </div>
  <div class="gdrop" id="gdr"></div>
  <div class="dvd">oder manuell</div>
  <div class="fg"><label class="fl">Titel *</label><input class="fi" id="ft" placeholder="Titel eingeben"></div>
  <div class="fg"><label class="fl">Autor *</label><input class="fi" id="fa" placeholder="Autor eingeben"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Jahr</label><input class="fi" id="fy" type="number" placeholder="z.B. 2024"></div>
    <div class="fg"><label class="fl">Genre</label>
      <select class="fsel" id="fg">
        <option>Thriller</option><option>Sci-Fi</option><option>Epen &amp; Universen</option>
        <option>Dark Romance</option><option>Erotic Thriller</option><option>LitRPG</option>
        <option>Gore &amp; Extreme Horror</option><option>Mindfuck</option><option>Dystopie</option>
        <option>Psychologie</option><option>Gesundheit</option><option>Kosmos-Astro</option>
        <option>Biografie-Memoiren</option><option>Business-Denken</option><option>Sonstiges</option>
      </select>
    </div>
  </div>
  <div class="fg"><label class="fl">Status</label>
    <select class="fsel" id="fst">
      <option value="read">✅ Gelesen</option>
      <option value="reading">📖 Lese gerade</option>
      <option value="want">🔖 Will lesen</option>
    </select>
  </div>
  <div class="fg">
    <label class="fl">Bewertung</label>
    <div class="stp" id="stp">
      <span class="spstar" data-v="1">★</span><span class="spstar" data-v="2">★</span>
      <span class="spstar" data-v="3">★</span><span class="spstar" data-v="4">★</span>
      <span class="spstar" data-v="5">★</span>
    </div>
  </div>
  <div class="fg"><label class="fl">Notiz</label><input class="fi" id="fn" placeholder="Eigene Gedanken …"></div>
  <button class="sbtn" onclick="saveB()">Speichern</button>
  <button class="cbtn" onclick="closeAdd()">Abbrechen</button>
 </div>
</div>

<div class="toast" id="toast"></div>

<script>
const RAW=[[1,"Die Therapie","Sebastian Fitzek",2006,"Fiction","Thriller",5,5,"mittel",0,"abends","Dr. Viktor Larenz zieht sich nach dem Verschwinden seiner Tochter auf eine abgelegene Insel zurück. Dort erscheint eine mysteriöse Patientin, die behauptet, seine Tochter zu kennen. Was folgt, ist ein psychologischer Thriller mit einem der stärksten Twists der deutschen Literatur. Fitzeks Debut-Roman – und bis heute sein Meisterstück.","Pflicht-Einstieg: Massstab fuer alles.","A"],[2,"Der Heimweg","Sebastian Fitzek",2020,"Fiction","Thriller",5,5,"mittel",0,"abends","Emma Stein ist allein auf dem Heimweg und ruft einen Fremden an, der ihr sicher nach Hause helfen soll. Der Thriller spielt in Echtzeit: 45 Minuten, ein Telefon, ein Killer. Fitzek entwickelt eine klaustrophobische Spannung, die sich von der ersten bis zur letzten Seite nicht löst. Kaum ein anderes Buch lässt sich weniger weglegen.","30-Min-Abende fuehlen sich wie 5 an.","A"],[3,"Das Paket","Sebastian Fitzek",2016,"Fiction","Thriller",5,4,"kurz",0,"abends","Eine Frau öffnet ein Paket, das nicht für sie bestimmt war – und löst damit eine Kettenreaktion aus, die sie in ihrer eigenen Wohnung zur Gefangenen macht. Fitzek konstruiert einen dichten Kammerthrill mit einem Mörder, den man nie sieht. Kurz, kompakt, brutal effizient: ein Wochenende reicht.","Kurz und brutal effizient.","A"],[4,"Splitter","Sebastian Fitzek",2009,"Fiction","Thriller",4,4,"mittel",0,"abends","Ein Mann erwacht nach einem Unfall mit einem Splitter im Gehirn – und mit Erinnerungen, die nicht seine eigenen sind. Diese Erinnerungen gehören einem Mörder. Fitzek verbindet neurologische Realität mit Psychothriller auf eine Weise, die unter die Haut geht. Der Roman trifft das Interesse an Gehirn und Identität direkt.","Neurologie trifft Fitzek-Tempo.","A"],[5,"Flugangst 7A","Sebastian Fitzek",2014,"Fiction","Thriller",5,4,"mittel",0,"abends","Ein Flugzeug über dem Atlantik wird zur Bühne eines Thrillers ohne Ausweg. Eine Frau mit Flugangst sitzt neben einem Mann, der vorgibt, ihr zu helfen – aber seine eigenen Pläne hat. Fitzek nutzt die geschlossene Kulisse meisterhaft: keine Flucht, kein Ausweg, 300 Seiten Hochspannung.","Geschlossene Kulisse, maximale Spannung.","A"],[6,"AchtNacht","Sebastian Fitzek",2021,"Fiction","Thriller",5,4,"mittel",0,"abends","Eine Nacht ohne Gesetze – die AchtNacht. Berlin versinkt im Chaos, als für 24 Stunden sämtliche Rechtsnormen außer Kraft gesetzt werden. Fitzek schreibt gesellschaftskritischen Thriller und zeigt, wie dünn die Schicht der Zivilisation ist. Packend, relevant, und mit dem typischen Fitzek-Twist am Ende.","Gesellschaftskritik + Fitzek-Tempo.","A"],[7,"Amokspiel","Sebastian Fitzek",2008,"Fiction","Thriller",4,4,"mittel",0,"abends","Ein Radiosender empfängt einen Anruf: Ein Geiselnehmer hält Menschen gefangen und verlangt, dass der Moderator ein perfides Spiel mitspielt – live auf Sendung. Fitzek nutzt das Medium Radio, um eine unmittelbare Nähe zum Geschehen zu erzeugen, die kaum ein anderes Format erreicht. Elektrisierend von der ersten bis zur letzten Seite.","Unmittelbarkeit durch Medium Radio.","B"],[8,"Der Seelenbrecher","Sebastian Fitzek",2008,"Fiction","Thriller",4,4,"mittel",0,"abends","Ein Psychiater wird in einer Nervenklinik als Patient eingesperrt – und niemand glaubt ihm, dass er eigentlich der Arzt ist. Fitzek spielt meisterhaft mit dem Unreliable-Narrator-Konzept und lässt den Leser bis zum Ende rätseln, wer lügt. Ein klassischer Psychothriller mit einem Twist, der alles verändert.","Unreliable Narrator + Psychiatrie.","B"],[9,"Noah","Sebastian Fitzek",2013,"Fiction","Thriller",4,4,"mittel",0,"abends","Ein Mann hilft Menschen beim Suizid – bis er einen Auftrag erhält, der ihn an seine eigenen Grenzen bringt. Noah ist Fitzeks philosophischstes und ungewöhnlichstes Buch, das Psychologie mit großen Fragen über Leben und Tod verbindet. Für Leser, die Fitzek jenseits des reinen Spannungsthrillers erleben möchten.","Psychologie trifft grosse Fragen.","B"],[10,"Playlist","Sebastian Fitzek",2021,"Fiction","Thriller",5,3,"kurz",0,"abends","Jemand lädt Songs auf ein Streaming-Portal hoch – und kurz darauf sterben die Menschen, die diese Songs zuletzt gehört haben. Fitzek verpackt einen Serienmörder-Thriller in ein originelles Musik-Konzept. Kurz, böse, ideal für einen Abend.","Ideal nach langen Tagen.","B"],[11,"Das Kind","Sebastian Fitzek",2008,"Fiction","Thriller",4,4,"mittel",0,"abends","Kind erinnert sich an Mord aus Vorleben. Fitzek von einer anderen Seite. Von Sebastian Fitzek, 2008. Genre: Thriller.","Fitzek von einer anderen Seite.","B"],[12,"Der Nachtwandler","Sebastian Fitzek",2013,"Fiction","Thriller",4,4,"mittel",0,"abends","Schlafwandeln mit toedlichen Folgen. Schlaf-Interesse trifft Thriller. Von Sebastian Fitzek, 2013. Genre: Thriller.","Schlaf-Interesse trifft Thriller.","B"],[13,"Piggy","Sebastian Fitzek",2022,"Fiction","Thriller",5,4,"mittel",0,"abends","Entfuehrung mit psychologischem Twist. Neueres Werk - Fitzek on form. Von Sebastian Fitzek, 2022. Genre: Thriller.","Neueres Werk - Fitzek on form.","B"],[14,"In der Spinnerin","Sebastian Fitzek",2023,"Fiction","Thriller",5,4,"mittel",0,"abends","Horror-Haus Thriller mit dunkler Vergangenheit. Fitzek trifft Haunted House. Von Sebastian Fitzek, 2023. Genre: Thriller.","Fitzek trifft Haunted House.","B"],[15,"Shadow Man","Cody McFadyen",2006,"Fiction","Thriller",4,5,"lang",1,"abends","FBI Special Agent Smoky Barrett kehrt nach einer persönlichen Katastrophe zum Dienst zurück – und wird sofort mit einem Serienmörder konfrontiert, der ihre Familie als nächstes Ziel ausgewählt hat. McFadyen schreibt dunkleren, tiefgründigeren Psychothriller als Fitzek: mehr Charakter, mehr Trauma, mehr Tiefe. Der Serienstart einer der besten Thriller-Serien überhaupt.","Intensiver als Fitzek - naechste Stufe.","A"],[16,"The Face of Death","Cody McFadyen",2007,"Fiction","Thriller",4,5,"lang",1,"abends","Smoky Barrett trifft auf einen Killer, der sich selbst 'Death' nennt und Menschen nicht tötet – er lässt sie sich selbst töten, indem er ihnen die schlimmsten Dinge zeigt, die die Menschheit zu bieten hat. McFadyen schreibt den dunkelsten Band seiner Serie und geht dabei weiter als fast jeder andere Mainstream-Thriller. Nichts für schwache Nerven – aber unvergesslich.","Fuer Abende mit mehr Energie.","A"],[17,"Abandoned","Cody McFadyen",2010,"Fiction","Thriller",4,5,"lang",1,"abends","Ein Kind wurde als Baby ausgesetzt und von einem Monster aufgezogen. Jahre später wird es zur Jägerin. McFadyen zeigt mit diesem Roman eine andere Seite seiner Erzählkunst: weniger FBI-Procedural, mehr psychologische Charakterstudie. Emotional, dunkel und hervorragend konstruiert.","McFadyen auf Hoehepunkt.","A"],[18,"Das Boese in uns","Arno Strobel",2016,"Fiction","Thriller",5,4,"mittel",0,"abends","Max Bischoff hat eine Gabe, die ihn zum besten Profiler macht – und zum unglücklichsten Menschen. Er kann Böses riechen. Arno Strobel erschafft eine der originellsten Figuren des deutschen Thrillergenres und lässt ihn einen Serienkiller jagen, der Muster hinterlässt, die keiner versteht. Serienstart: sofort mit Band 2 weiterlesen.","Strobel trifft Psychologie.","A"],[19,"Moerderfinder","Arno Strobel",2014,"Fiction","Thriller",5,4,"mittel",0,"abends","Eine innere Stimme flüstert einem Mann Dinge ein – zuerst harmlos, dann immer dunkler. Strobel untersucht die Frage, ob das Böse in uns lebt oder von außen in uns eindringt. Psychologisch präzise, schnell erzählt, mit einem Ende, das man nicht vergisst.","Ideale Abend-Routine-Serie.","A"],[20,"Im Netz des Boesen","Arno Strobel",2019,"Fiction","Thriller",5,4,"mittel",0,"abends","Ein Darknet-Marktplatz für das Schlimmste, was Menschen einander antun können. Strobels Darknet-Thriller trifft den digitalen Zeitgeist und zeigt, was hinter anonymen Screens passiert. Schnell, beunruhigend aktuell, ideal für kurze Abende.","Digital + dunkel + schnell.","A"],[21,"Der Spiegel des Boesen","Arno Strobel",2017,"Fiction","Thriller",5,3,"mittel",0,"abends","Killer kopiert historische Verbrechen. Tempo maximal. Von Arno Strobel, 2017. Genre: Thriller.","Tempo maximal.","B"],[22,"In deiner Haut","Arno Strobel",2020,"Fiction","Thriller",5,4,"mittel",0,"abends","Identitaetstausch-Thriller. Was wenn niemand dich kennt?. Von Arno Strobel, 2020. Genre: Thriller.","Was wenn niemand dich kennt?","B"],[23,"Kalteschlaf","Arno Strobel",2018,"Fiction","Thriller",5,3,"mittel",0,"abends","Amy Dunne verschwindet am fünften Hochzeitstag. Ihr Mann Nick wird verdächtig. Aber je mehr man liest, desto unsicherer wird man, wem man vertrauen kann. Gone Girl definiert den modernen Psychothriller neu: zwei unzuverlässige Erzähler, ein Twist nach dem anderen, ein Ende das spaltet. Pflichtlektüre.","Sci-Fi trifft Strobel.","B"],[24,"Gone Girl","Gillian Flynn",2012,"Fiction","Thriller",4,5,"mittel",0,"abends","Reporterin Camille Preaker kehrt in ihre Heimatstadt Wind Gap zurück, um über die Morde an zwei Mädchen zu berichten. Was sie findet, ist die Dunkelheit ihrer eigenen Vergangenheit. Flynn schreibt psychologisch brutaler als fast jeder andere: Selbstverletzung, toxische Mütter, und ein Ende, das einem den Atem verschlägt. Ihr bestes Buch.","Bester Unreliable Narrator.","A"],[25,"Sharp Objects","Gillian Flynn",2006,"Fiction","Thriller",4,5,"mittel",1,"abends","Libby Day überlebte als Kind ein Massaker, das ihren Bruder Ben ins Gefängnis brachte. Jahre später zahlen ihr Menschen dafür, dass sie beweist, er sei unschuldig. Je tiefer sie gräbt, desto mehr zweifelt sie an ihrer eigenen Erinnerung. Flynn auf Hochtouren: Spannung, Psychologie, und ein Plot voller Wendungen.","Flynn maximal dunkel.","A"],[26,"Dark Places","Gillian Flynn",2009,"Fiction","Thriller",4,4,"mittel",1,"abends","Alicia Berenson schoss ihrem Mann fünf Mal ins Gesicht – und schwieg seitdem kein einziges Wort. Therapeut Theo Faber ist besessen davon, sie zum Sprechen zu bringen. Was er herausfindet, verändert alles, was er zu wissen glaubte. Der Twist am Ende dieses Romans gehört zu den besten der Thriller-Literatur. Unbedingt lesen – aber nichts vorher googeln.","Flynn-Trilogie komplett.","A"],[27,"The Silent Patient","Alex Michaelides",2019,"Fiction","Thriller",5,5,"mittel",0,"abends","Stumme Frau erschoss Mann. Perfekter Twist: Fitzek-Niveau. Von Alex Michaelides, 2019. Genre: Thriller.","Perfekter Twist: Fitzek-Niveau.","A"],[28,"The Maidens","Alex Michaelides",2021,"Fiction","Thriller",4,4,"mittel",0,"abends","Schriftstellerin Lowen Ashleigh soll das nächste Buch der erfolgreichen Autorin Verity Crawford fertigstellen. Im Haus der Crawfords findet sie ein Manuskript, das Verity selbst geschrieben hat – und das Dinge enthüllt, die kein Mensch je lesen sollte. Colleen Hoover verbindet Dark Romance, Psychothriller und einen Twist auf engstem Raum. Das beste Genre-Crossover der letzten Jahre.","Michaelides zweites Werk.","B"],[29,"Verity","Colleen Hoover",2018,"Fiction","Thriller",5,5,"mittel",1,"abends","Autorin findet dunkles Manuskript. Bestes Genre-Crossover. Von Colleen Hoover, 2018. Genre: Thriller.","Bestes Genre-Crossover.","A"],[30,"The Housemaid","Freida McFadyen",2022,"Fiction","Thriller",5,4,"mittel",1,"abends","Haushalterin vs. mysteriose Arbeitgeberin. Fitzek-Tempo, weiblich. Von Freida McFadyen, 2022. Genre: Thriller.","Fitzek-Tempo, weiblich.","B"],[31,"The Locked Door","Freida McFadyen",2022,"Fiction","Thriller",5,4,"mittel",1,"abends","Chirurgin - alte Schatten kehren zurueck. Medizin + Thriller. Von Freida McFadyen, 2022. Genre: Thriller.","Medizin + Thriller.","B"],[32,"Never Never","Freida McFadyen",2023,"Fiction","Thriller",5,4,"mittel",0,"abends","Paar ohne Erinnerungen. Blake-Crouch-Feeling light. Von Freida McFadyen, 2023. Genre: Thriller.","Blake-Crouch-Feeling light.","B"],[33,"I Am Pilgrim","Terry Hayes",2013,"Fiction","Thriller",4,5,"lang",0,"Wochenende","Elitespion jagt Bioterroristen - 700 Seiten. Weltklasse-Thriller. Von Terry Hayes, 2013. Genre: Thriller.","Weltklasse-Thriller.","A"],[34,"The Guest List","Lucy Foley",2020,"Fiction","Thriller",5,4,"mittel",0,"abends","Hochzeit auf Insel - Gast stirbt. Agatha-Christie modern. Von Lucy Foley, 2020. Genre: Thriller.","Agatha-Christie modern.","B"],[35,"The Last Thing He Told Me","Laura Dave",2022,"Fiction","Thriller",5,5,"mittel",0,"abends","Mann verschwindet - Frau wird gejagt. Beste Thriller-Debut. Von Laura Dave, 2022. Genre: Thriller.","Beste Thriller-Debut.","B"],[36,"The Kind Worth Killing","Peter Swanson",2015,"Fiction","Thriller",5,4,"mittel",0,"abends","Flugzeug-Gespraech fuehrt zu Mordplan. Hitchcock modern. Von Peter Swanson, 2015. Genre: Thriller.","Hitchcock modern.","B"],[37,"The Troop","Nick Cutter",2014,"Fiction","Thriller",3,5,"mittel",2,"Wochenende","Insel-Horror: verhuhngerter Mann bei Pfadfindern. Einstieg in Gore. Von Nick Cutter, 2014. Genre: Thriller.","Einstieg in Gore.","A"],[38,"Mr. Mercedes","Stephen King",2014,"Fiction","Thriller",5,4,"mittel",0,"abends","Rentner-Detektiv jagt Massenmoerder. Kings zugaenglichster Thriller. Von Stephen King, 2014. Genre: Thriller.","Kings zugaenglichster Thriller.","B"],[39,"The Outsider","Stephen King",2018,"Fiction","Thriller",4,5,"mittel",0,"abends","Killer mit absolutem Alibi. King + Uebernatuerliches light. Von Stephen King, 2018. Genre: Thriller.","King + Uebernatuerliches light.","B"],[40,"Billy Summers","Stephen King",2021,"Fiction","Thriller",4,5,"mittel",0,"abends","Auftragskiller: ein letzter Job. Kings bester Non-Horror-Thriller. Von Stephen King, 2021. Genre: Thriller.","Kings bester Non-Horror-Thriller.","B"],[41,"Holly","Stephen King",2023,"Fiction","Thriller",4,4,"mittel",0,"abends","Holly Gibney bekommt eigenen Roman. King-Neuerscheinung. Von Stephen King, 2023. Genre: Thriller.","King-Neuerscheinung.","B"],[42,"Where the Crawdads Sing","Delia Owens",2018,"Fiction","Thriller",5,5,"mittel",0,"abends","Mord im Sumpf - Maedchen das allein aufwuchs. Literarischer Thriller. Von Delia Owens, 2018. Genre: Thriller.","Literarischer Thriller.","B"],[43,"Shutter Island","Dennis Lehane",2003,"Fiction","Thriller",5,5,"mittel",0,"abends","Psychiatrische Insel - was stimmt nicht?. Twist-Klassiker. Von Dennis Lehane, 2003. Genre: Thriller.","Twist-Klassiker.","B"],[44,"Razorblade Tears","S.A. Cosby",2021,"Fiction","Thriller",5,5,"mittel",1,"abends","Zwei Ex-Knackis raechen ermordete Kinder. Noir-Thriller mit Herz. Von S.A. Cosby, 2021. Genre: Thriller.","Noir-Thriller mit Herz.","B"],[45,"Survive the Night","Riley Sager",2021,"Fiction","Thriller",5,4,"mittel",0,"abends","Roadtrip - ist Mitfahrer ein Serienkiller?. Klaustrophobie auf Raedern. Von Riley Sager, 2021. Genre: Thriller.","Klaustrophobie auf Raedern.","B"],[46,"The Girl with the Dragon Tattoo","Stieg Larsson",2005,"Fiction","Thriller",4,5,"lang",0,"Wochenende","Hacker und Journalist loesen Cold Case. Zeitlos. Von Stieg Larsson, 2005. Genre: Thriller.","Zeitlos.","B"],[47,"Behind Closed Doors","B.A. Paris",2016,"Fiction","Thriller",5,4,"mittel",1,"abends","Astronaut Mark Watney wird versehentlich auf dem Mars zurückgelassen. Mit begrenzten Vorräten, keiner Kommunikation zur Erde und dem Mars als einziger Gesellschaft muss er überleben. Andy Weir schreibt Humor, Wissenschaft und Spannung zu einem unwiderstehlichen Mix. Das beste Sci-Fi-Buch der letzten Dekade – und der beste Einstieg ins Genre.","Kurz und boese.","B"],[48,"The Perfect Nanny","Leila Slimani",2016,"Fiction","Thriller",4,5,"kurz",0,"abends","Ryland Grace wacht ohne Erinnerung in einem Raumschiff auf und muss herausfinden, wer er ist und warum er hier ist. Was er entdeckt, übersteigt alles, was er erwartet hätte. Weir schreibt emotionaler und tiefer als in The Martian: Ein Buch über Freundschaft, Opfer und die Frage, was das Leben wert ist. Noch besser als The Martian.","Literarischer Schock-Thriller.","B"],[49,"The Appeal","Janice Hallett",2021,"Fiction","Thriller",4,5,"mittel",0,"abends","Die Menschheit lebt in einem unterirdischen Silo, weil die Oberfläche tödlich vergiftet ist. Niemand zweifelt daran – bis Juliette Nichols beginnt, Fragen zu stellen. Hugh Howey erschafft eine dichte, bedrückende Welt, in der die größte Bedrohung nicht die vergiftete Luft ist, sondern das System selbst. Beste Dystopie seit 1984.","Einzigartiges E-Mail-Format.","B"],[50,"One of Us Is Lying","Karen McManus",2017,"Fiction","Thriller",5,4,"mittel",0,"abends","Das Geheimnis der Silos beginnt zu enthüllen sich: Wer hat sie gebaut? Warum? Und wer wusste es die ganze Zeit? Shift ergänzt Wool perfekt und zeigt die Geschichte aus einer völlig anderen Perspektive – zeitlich und emotional. Noch dunkler als der erste Teil.","Schnell, clever, ideal 30 Min.","B"],[51,"A Flicker in the Dark","Stacy Willingham",2022,"Fiction","Thriller",5,4,"mittel",0,"abends","Alle Fäden laufen zusammen: Juliette, Donald und die Wahrheit über die Silos. Dust schließt die Trilogie mit einem Ende ab, das sowohl befriedigend als auch düster ist. Howey hält das Tempo bis zur letzten Seite.","Debut mit echtem Twist.","B"],[52,"Luckiest Girl Alive","Jessica Knoll",2015,"Fiction","Thriller",4,5,"mittel",1,"abends","Physiker Jason Dessen wird eines Abends überwältigt und wacht in einem fremden Leben auf – verheiratet mit einer anderen Frau, mit einer anderen Karriere, in einer anderen Realität. Blake Crouch verbindet Quantenphysik mit emotionalem Thriller und schreibt ein Buch, das man in einem Rutsch liest. Tempo, Twist und Herzschmerz in einem.","Sharp Objects trifft NYC.","B"],[53,"Local Woman Missing","Mary Kubica",2021,"Fiction","Thriller",5,4,"mittel",0,"abends","Die Neurowissenschaftlerin Barry Sutton entdeckt eine Technologie, mit der man Erinnerungen verändern kann. Was als Segen gedacht ist, zerstört die Realität selbst. Noch besser konstruiert als Dark Matter: Crouch erschafft ein Zeitreise-Paradox ohne Zeitreise und stellt dabei die Frage, was uns als Person ausmacht.","Twist-Thriller.","B"],[54,"Final Girls","Riley Sager",2017,"Fiction","Thriller",4,4,"mittel",0,"aben const GE={"Thriller":"🔪","Sci-Fi":"🚀","Mindfuck":"🌀","LitRPG":"⚔️","Dark Romance":"🖤","Erotic Thriller":"🔥","Explicit Dark & Taboo":"🔞","Gore & Extreme Horror":"💀","Dystopie":"🏚️","Epen & Universen":"🌍","Neu 2024-2026":"✨","Psychologie":"🧠","Gehirn-Neurowiss":"⚡","Kosmos-Astro":"🌌","Menschheit-Evol":"🦴","Aliens-Kont":"👽","Gesundheit":"💪","Verschwoerung-Krit":"🕵️","Biografie-Memoiren":"📝","Business-Denken":"💡"};
function ge(g){return GE[g]||"📚";}
function all(){return[...BOOKS,...CU];}
function bst(b){return ST[b.id]||"";}
function brt(b){return RT[b.id]||0;}
function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("on");setTimeout(()=>el.classList.remove("on"),2300);}
function starsH(n,sm){const c=sm?"cstar":"exstar";return[1,2,3,4,5].map(i=>`<span class="${c}${i<=n?" on":""}">${i<=n?"★":"☆"}</span>`).join("");}

// ── GOOGLE BOOKS API with proxy fallback ──────────────────────────────────
// Try direct first, then proxy for file:// contexts
async function gFetch(url){
  // Direct fetch first (works on GitHub Pages / HTTPS)
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(8000),mode:"cors"});
    if(r.ok){const d=await r.json();return d;}
  }catch(e){}
  // Fallback proxy for file:// or network issues
  try{
    const proxy="https://api.allorigins.win/get?url="+encodeURIComponent(url);
    const r=await fetch(proxy,{signal:AbortSignal.timeout(10000)});
    if(r.ok){const d=await r.json();return JSON.parse(d.contents);}
  }catch(e){}
  return null;
}

function fixCover(url){
  if(!url)return "";
  // Force HTTPS, increase zoom for better resolution
  return url.replace("http://","https://").replace("zoom=1","zoom=2").replace("&edge=curl","");
}

async function gSearch(q){
  // No fields restriction so we get all imageLinks variants
  const url="https://www.googleapis.com/books/v1/volumes?q="+encodeURIComponent(q)+"&maxResults=8&printType=books";
  const d=await gFetch(url);
  if(!d||!d.items)return[];
  return d.items.map(item=>{
    const v=item.volumeInfo||{};
    const img=v.imageLinks||{};
    const rawCover=img.extraLarge||img.large||img.medium||img.thumbnail||img.smallThumbnail||"";
    return{
      gid:item.id,
      title:v.title||"",
      author:(v.authors||[]).join(", "),
      year:parseInt((v.publishedDate||"0").slice(0,4))||0,
      desc:v.description||"",
      cover:fixCover(rawCover),
      genre:(v.categories||["Sonstiges"])[0]
    };
  });
}

async function gDesc(b){
  const url=`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent('"'+b.title+'" '+b.author)}&maxResults=1&fields=items(volumeInfo(description,imageLinks))`;
  const d=await gFetch(url);
  if(!d)return null;
  const v=d?.items?.[0]?.volumeInfo;
  if(!v)return null;
  const img=v.imageLinks||{};
  const cover=(img.thumbnail||img.smallThumbnail||"").replace("http://","https://");
  return{desc:v.description||null,cover:cover||null};
}

// ── COVER MANAGEMENT ──────────────────────────────────────────────────────
function applyCover(id,url){
  if(!url)return;
  const safe=url.replace("http://","https://");
  if(CV[id]===safe)return;
  CV[id]=safe;
  document.querySelectorAll("img[data-cid='"+id+"']").forEach(img=>{
    img.src=safe;
    img.style.display="block";
    img.onerror=function(){this.style.display="none";};
    const ph=img.previousElementSibling;
    if(ph&&(ph.classList.contains("cph")||ph.tagName==="SPAN"))ph.style.display="none";
  });
}

async function loadCover(b){
  if(CV[b.id]){applyCover(b.id,CV[b.id]);return;}
  const data=await gDesc(b);
  if(data?.cover){applyCover(b.id,data.cover);save();}
}

// ── FILTER + SORT ─────────────────────────────────────────────────────────
function filtered(){
  let bks=all();
  if(cG!=="all")bks=bks.filter(b=>b.genre===cG);
  if(cT!=="all")bks=bks.filter(b=>bst(b)===cT);
  if(Q)bks=bks.filter(b=>b.title.toLowerCase().includes(Q)||b.author.toLowerCase().includes(Q)||b.genre.toLowerCase().includes(Q));
  const po={A:0,B:1,C:2},so={reading:0,want:1,read:3};
  bks.sort((a,b)=>{const dp=(po[a.prio]??1)-(po[b.prio]??1);if(dp)return dp;return((so[bst(a)]??2))-(so[bst(b)]??2);});
  return bks;
}

function updC(){
  const a=all();
  const rd=a.filter(b=>bst(b)==="read").length;
  const rg=a.filter(b=>bst(b)==="reading").length;
  const wt=a.filter(b=>bst(b)==="want").length;
  document.getElementById("cr").textContent=rd;
  document.getElementById("cg").textContent=rg;
  document.getElementById("tn-all").textContent=a.length;
  document.getElementById("tn-read").textContent=rd;
  document.getElementById("tn-reading").textContent=rg;
  document.getElementById("tn-want").textContent=wt;
}

  const mkCv=(cls,ph)=>`<div class="${cls}">
    <span class="${ph}" ${cu?"style='display:none'":""}>${isCu?"📘":"📖"}</span>
    <img data-cid="${e(id)}" src="${e(cu)}" class="${cu?"ld":""}" loading="lazy">
  </div>`;

  let exH="";
  if(isE){
    const rt=brt(b);
    exH=`<div class="cex">
      <div class="exrow">
        ${mkCv("excv","excvph")}
        <div class="exm">
          <div class="emr"><b>${e(b.author)}</b></div>
          ${b.year?`<div class="emr">${b.year}</div>`:""}
          <div class="emr">${ge(b.genre)} ${e(b.genre)}</div>
          ${b.length?`<div class="emr">${{"kurz":"📏 Kurz","mittel":"📏 Mittel","lang":"📏 Lang"}[b.length]||""}</div>`:""}
          <div class="exstars" id="es-${e(id)}" onclick="event.stopPropagation()">
            ${[1,2,3,4,5].map(i=>`<span class="exstar${i<=rt?" on":""}" onclick="setR('${e(id)}',${i})">${i<=rt?"★":"☆"}</span>`).join("")}
          </div>
        </div>
      </div>
      <div class="edesc" id="ed-${e(id)}">${e(b.desc||"")}</div>
      ${b.why&&b.why!==b.desc?`<div class="ewhy">${e(b.why)}</div>`:""}
      <div class="acts">
        <button class="ab r${st==="read"?" on":""}" onclick="setSt(event,'${e(id)}','read')">✅ Gelesen</button>
        <button class="ab g${st==="reading"?" on":""}" onclick="setSt(event,'${e(id)}','reading')">📖 Gerade</button>
        <button class="ab b${st==="want"?" on":""}" onclick="setSt(event,'${e(id)}','want')">🔖 Merken</button>
      </div>
    </div>`;
  }

  return`<div class="bc${st?" s"+{read:"r",reading:"g",want:"w2"}[st]:""}${isCu?" cst":""}${isE?" exp":""}" data-id="${e(id)}" onclick="tap('${e(id)}')">
  <div class="cr">
    ${mkCv("cv","cvph")}
    <div class="ci">
      <div class="ct">${e(b.title)}</div>
      <div class="ca">${e(b.author)}${b.year?" · "+b.year:""}</div>
      <div class="cbdg">
        <span class="bdg dg">${ge(b.genre)} ${e(b.genre)}</span>
        ${b.prio==="A"?'<span class="bdg da">A</span>':""}
        ${b.prio==="B"?'<span class="bdg db">B</span>':""}
        ${b.explicit>=2?'<span class="bdg dx">🔞</span>':""}
        ${isCu?'<span class="bdg dp">Eigenes</span>':""}
      </div>
      ${rt>0?`<div class="cst2">${starsH(rt,true)}</div>`:""}
    </div>
    <div class="csi">${st?SIC[st]:""}</div>
  </div>${exH}
</div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  if(cV!=="list")return;
  updC();
  const bks=filtered();
  const el=document.getElementById("lw");
  if(!bks.length){el.innerHTML=`<div class="empty"><div class="emico">📭</div><div style="font-size:13px;color:var(--t3)">Keine Bücher gefunden.</div></div>`;return;}
  el.innerHTML=bks.map(b=>cardH(b)).join("");
  // Apply known covers instantly
  bks.forEach(b=>{if(CV[b.id])applyCover(b.id,CV[b.id]);});
  // Load unknown covers for first visible books
  bks.slice(0,20).forEach(b=>{if(!CV[b.id])loadCover(b);});
}

// ── TAP → EXPAND ──────────────────────────────────────────────────────────
function tap(id){
  if(OID===id){OID=null;render();return;}
  OID=id;render();
  // Scroll card into view
  setTimeout(()=>{
    const el=document.querySelector("[data-id='"+id+"']");
    if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"});
  },80);
  // Async: load full description + better cover without blocking UI
  loadFull(id);
}

async function loadFull(id){
  const b=BMAP.get(id)||CU.find(x=>x.id===id);
  if(!b)return;
  try{
    const data=await gDesc(b);
    if(!data)return;
    // Update description if we got a better one
    if(data.desc&&data.desc.length>b.desc.length){
      const el=document.getElementById("ed-"+id);
      if(el)el.textContent=data.desc;
    }
    // Update cover
    if(data.cover&&!CV[id]){
      applyCover(id,data.cover);save();
    }
  }catch(err){}
}

// ── STATUS + RATING ───────────────────────────────────────────────────────
function setSt(ev,id,st){
  ev.stopPropagation();
  if(ST[id]===st)delete ST[id];else ST[id]=st;
  save();render();updC();
  const lbl={read:"Gelesen ✅",reading:"Lese gerade 📖",want:"Gemerkt 🔖"};
  toast(ST[id]?lbl[st]:"Status entfernt");
  if(cV==="recs")buildRecs();
  if(cV==="stats")buildStats();
}

function setR(id,val){
  if(RT[id]===val)delete RT[id];else RT[id]=val;
  save();
  const n=RT[id]||0;
  // Update only the star elements, no full re-render
  const row=document.getElementById("es-"+id);
  if(row)row.innerHTML=[1,2,3,4,5].map(i=>`<span class="exstar${i<=n?" on":""}" onclick="setR('${e(id)}',${i})">${i<=n?"★":"☆"}</span>`).join("");
  // Update small stars
  const card=document.querySelector("[data-id='"+id+"'] .cst2");
  if(card)card.innerHTML=n>0?starsH(n,true):"";
}

// ── RECS ──────────────────────────────────────────────────────────────────
function buildRecs(){
  const rd=BOOKS.filter(b=>ST[b.id]==="read"||ST[b.id]==="reading");
  const el=document.getElementById("vR");
  if(!rd.length){el.innerHTML=`<div class="empty"><div class="emico">✨</div><div style="font-size:13px;color:var(--t3)">Markiere Bücher als gelesen,<br>um Empfehlungen zu erhalten.</div></div>`;return;}
  const gc={};rd.forEach(b=>{gc[b.genre]=(gc[b.genre]||0)+1;});
  const topG=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  const rIds=new Set(rd.map(b=>b.id));
  const wIds=new Set(BOOKS.filter(b=>ST[b.id]==="want").map(b=>b.id));
  let html="";
  const top=BOOKS.filter(b=>b.prio==="A"&&topG.includes(b.genre)&&!rIds.has(b.id)&&!wIds.has(b.id)).slice(0,6);
  if(top.length)html+=rSec("🎯 Perfekt für dich",top);
  topG.slice(0,2).forEach(g=>{
    const gr=BOOKS.filter(b=>b.genre===g&&!rIds.has(b.id)&&!wIds.has(b.id)).sort((a,b)=>(b.impact||0)-(a.impact||0)).slice(0,4);
    if(gr.length)html+=rSec(ge(g)+" Mehr "+g,gr);
  });
  const otherG=[...new Set(BOOKS.map(b=>b.genre))].filter(g=>!topG.includes(g));
  const disc=BOOKS.filter(b=>otherG.includes(b.genre)&&b.prio==="A"&&!rIds.has(b.id)).sort((a,b)=>(b.impact||0)-(a.impact||0)).slice(0,4);
  if(disc.length)html+=rSec("🎲 Neues entdecken",disc);
  el.innerHTML=html;
}

function rSec(title,bks){
  return`<div class="rsec"><div class="rh">${title}</div>${bks.map(b=>{
    const st=bst(b);const cu=CV[b.id]||"";
    return`<div class="bc${st?" s"+{read:"r",reading:"g",want:"w2"}[st]:""}" onclick="qMark('${b.id}')">
      <div class="cr">
        <div class="cv"><span class="cvph" ${cu?"style='display:none'":""}}>📖</span><img data-cid="${e(b.id)}" src="${e(cu)}" class="${cu?"ld":""}" loading="lazy"></div>
        <div class="ci">
          <div class="ct">${e(b.title)}</div>
          <div class="ca">${e(b.author)}</div>
          <div class="cbdg"><span class="bdg dg">${ge(b.genre)} ${e(b.genre)}</span>${b.prio==="A"?'<span class="bdg da">A</span>':""}</div>
          <div style="font-size:12px;color:var(--t2);margin-top:6px;line-height:1.55">${e(b.why||"")}</div>
        </div>
        <div class="csi">${st?SIC[st]:"🔖"}</div>
      </div></div>`;
  }).join("")}</div>`;
}

function qMark(id){
  if(!ST[id]){ST[id]="want";save();toast("Gemerkt 🔖");updC();buildRecs();}
  else{sv("list");setTimeout(()=>{OID=id;render();},80);}
}

// ── STATS ─────────────────────────────────────────────────────────────────
function buildStats(){
  const a=all();
  const rd=a.filter(b=>bst(b)==="read");
  const rg=a.filter(b=>bst(b)==="reading");
  const wt=a.filter(b=>bst(b)==="want");
  const gc={};rd.forEach(b=>{gc[b.genre]=(gc[b.genre]||0)+1;});
  const topG=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mx=topG[0]?.[1]||1;
  const rated=a.filter(b=>brt(b)>0);
  const avg=rated.length?Math.round(rated.reduce((s,b)=>s+brt(b),0)/rated.length*10)/10:0;
  document.getElementById("vS").innerHTML=`
<div class="vt">Deine Bibliothek</div>
<div class="sg">
  <div class="sc"><div class="scn">${a.length}</div><div class="scl">Gesamt</div></div>
  <div class="sc"><div class="scn" style="color:var(--grn)">${rd.length}</div><div class="scl">Gelesen</div></div>
  <div class="sc"><div class="scn" style="color:var(--gold)">${rg.length}</div><div class="scl">Lese gerade</div></div>
  <div class="sc"><div class="scn" style="color:var(--blu)">${wt.length}</div><div class="scl">Will lesen</div></div>
  ${avg?`<div class="sc"><div class="scn" style="color:#f5c518">${avg}★</div><div class="scl">Ø Bewertung</div></div>`:""}
  ${CU.length?`<div class="sc"><div class="scn" style="color:var(--pur)">${CU.length}</div><div class="scl">Eigene Bücher</div></div>`:""}
</div>
${topG.length?`<div class="vt" style="font-size:16px;margin-bottom:12px">Gelesen nach Genre</div>${topG.map(([g,n])=>`<div class="gbar"><div class="gbl"><span>${ge(g)} ${g}</span><span style="color:var(--gold)">${n}</span></div><div class="gbt"><div class="gbf" style="width:${Math.round(n/mx*100)}%"></div></div></div>`).join("")}`:""}`;
}

  ).slice(0,4);

  let html="";
  if(lm.length){
    html+=`<div class="dsec">In deiner Bibliothek</div>`;
    html+=lm.map(b=>{
      const cu=CV[b.id]||"";const st=bst(b);
      return`<div class="gitem" onclick="selL('${e(b.id)}')">
        <div class="gicover">${cu?`<img src="${e(cu)}">`:"📖"}</div>

  }

    save();toast(`"${title}" gespeichert`);closeAdd();render();updC();
  };
  if(PL){saveLocal(PL);return;}
  const ex=BOOKS.find(b=>b.title.toLowerCase()===title.toLowerCase()&&b.author.toLowerCase()===author.toLowerCase());
  if(ex){saveLocal(ex.id);return;}

  // New custom book
  const cid="c"+Date.now();
  CU.push({id:cid,customId:cid,title,author,year:yr,category:"Fiction",genre:gn,readability:3,impact:3,length:"mittel",explicit:0,window:"abends",desc:PG?.desc||nt||"",why:"Eigenes Buch",prio:"B"});
  if(PG?.cover)CV[cid]=PG.cover;
  ST[cid]=st;if(FR)RT[cid]=FR;if(nt)NT[cid]=nt;
  save();toast(`"${title}" hinzugefügt ✅`);closeAdd();render();updC();
}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
buildFilters();
render();
updC();
// Background cover preload top Prio-A books
setTimeout(()=>{
  BOOKS.filter(b=>b.prio==="A"&&!CV[b.id]).slice(0,50).forEach((b,i)=>
    setTimeout(()=>loadCover(b),500+i*200));
},1800);
</script>
