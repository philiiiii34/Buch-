<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bibliothek">
<title>Meine Bibliothek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c10;--surf:#14141a;--surf2:#1c1c24;--surf3:#222230;
  --bdr:#2a2a38;--bdr2:#333345;
  --gold:#c8a96e;--purple:#7c6fcd;--green:#5cb88a;--blue:#5c8fe0;--red:#e05c5c;
  --tx:#e8e6f0;--tx2:#9896a8;--tx3:#5a586a;
  --r:14px;--rsm:10px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:"DM Sans",sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.hdr{padding:calc(44px + var(--st)) 16px 12px;background:rgba(12,12,16,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.logo{font-family:"Playfair Display",serif;font-size:21px;color:var(--gold);flex:1;}
.hpill{background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:4px;}
.hpill b{color:var(--gold);}
.sw{position:relative;}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:15px;pointer-events:none;}
.sinp{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:10px 36px 10px 38px;color:var(--tx);font-size:15px;font-family:"DM Sans",sans-serif;outline:none;transition:border-color .2s;}
.sinp:focus{border-color:var(--gold);}
.scl{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--bdr);border:none;color:var(--tx2);width:20px;height:20px;border-radius:50%;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.scl.v{display:flex;}

.fstrip{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.fstrip::-webkit-scrollbar{display:none;}
.fb{white-space:nowrap;background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:5px 12px;font-size:11.5px;font-family:"DM Sans",sans-serif;color:var(--tx2);cursor:pointer;transition:all .15s;flex-shrink:0;}
.fb.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:500;}

.stabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0;padding:0 8px;}
.stab{flex:1;padding:9px 2px;text-align:center;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:3px;}
.stab.on{color:var(--gold);border-bottom-color:var(--gold);}
.tn{background:var(--surf2);border-radius:10px;padding:1px 5px;font-size:10px;}
.stab.on .tn{background:var(--gold);color:#000;}

.lw{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px calc(76px + var(--sb));scrollbar-width:none;}
.lw::-webkit-scrollbar{display:none;}

/* CARD */
.bc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s;overflow:hidden;}
.bc:active{opacity:.9;}
.bc.s-read{border-left:3px solid var(--green);}
.bc.s-reading{border-left:3px solid var(--gold);}
.bc.s-want{border-left:3px solid var(--blue);}
.bc.custom{border-left:3px solid var(--purple);}

.cr{display:flex;gap:10px;padding:10px 12px;}
.cv{width:50px;height:72px;border-radius:6px;background:var(--surf2);border:1px solid var(--bdr);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--tx3);}
.cv img{width:100%;height:100%;object-fit:cover;display:block;}
.ci{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.ct{font-family:"Playfair Display",serif;font-size:14px;line-height:1.3;color:var(--tx);}
.ca{font-size:11.5px;color:var(--tx2);margin-top:3px;}
.cbdg{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.bdg{font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid;font-weight:500;}
.bg{background:rgba(124,111,205,.15);border-color:rgba(124,111,205,.4);color:#a09add;}
.ba{background:rgba(224,92,92,.15);border-color:rgba(224,92,92,.4);color:#e07a7a;}
.bb{background:rgba(200,169,110,.15);border-color:rgba(200,169,110,.4);color:var(--gold);}
.bc2{background:rgba(92,184,138,.15);border-color:rgba(92,184,138,.4);color:var(--green);}
.bx{background:rgba(224,92,92,.2);border-color:rgba(224,92,92,.5);color:#e09090;}
.bcu{background:rgba(124,111,205,.15);border-color:rgba(124,111,205,.4);color:#a09add;}
.csi{font-size:16px;flex-shrink:0;align-self:flex-start;padding-top:2px;}
.cstars{display:flex;gap:1px;margin-top:5px;}
.cstar{font-size:11px;color:var(--tx3);}
.cstar.on{color:#f5c518;}

/* EXPANDED */
.cexp{display:none;padding:0 12px 14px;}
.bc.exp .cexp{display:block;}
.bc.exp .ct{white-space:normal;}
.bc.exp .cv{width:50px;height:72px;}

.ext{display:flex;gap:12px;margin-bottom:12px;}
.excv{width:84px;height:122px;border-radius:8px;background:var(--surf2);border:1px solid var(--bdr);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--tx3);}
.excv img{width:100%;height:100%;object-fit:cover;}
.exm{flex:1;display:flex;flex-direction:column;gap:5px;}
.exmr{font-size:12px;color:var(--tx2);}
.exmr b{color:var(--tx);}
.exstars{display:flex;gap:4px;cursor:pointer;margin-top:2px;}
.exstar{font-size:22px;color:var(--tx3);transition:color .1s;-webkit-user-select:none;user-select:none;}
.exstar.on{color:#f5c518;}

.exdesc{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:10px;}
.exwhy{font-size:12px;color:var(--gold);font-style:italic;line-height:1.5;padding:8px 10px;background:rgba(200,169,110,.08);border-radius:8px;border:1px solid rgba(200,169,110,.15);margin-bottom:10px;}

.acts{display:flex;gap:6px;}
.abt{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf2);color:var(--tx2);font-size:11.5px;font-family:"DM Sans",sans-serif;cursor:pointer;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;}
.abt.r{border-color:rgba(92,184,138,.4);color:var(--green);}
.abt.r.on{background:var(--green);color:#000;border-color:var(--green);}
.abt.g{border-color:rgba(200,169,110,.4);color:var(--gold);}
.abt.g.on{background:var(--gold);color:#000;border-color:var(--gold);}
.abt.w{border-color:rgba(92,143,224,.4);color:var(--blue);}
.abt.w.on{background:var(--blue);color:#fff;border-color:var(--blue);}

.empty{text-align:center;padding:50px 20px;color:var(--tx3);}
.emico{font-size:44px;margin-bottom:10px;}
.emtxt{font-size:13px;line-height:1.6;}
.ldg{display:flex;align-items:center;justify-content:center;height:180px;color:var(--tx3);font-size:13px;gap:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite;}

.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,16,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;padding:8px 0 calc(8px + var(--sb));z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;cursor:pointer;color:var(--tx3);transition:color .15s;background:none;border:none;font-family:"DM Sans",sans-serif;}
.nb.on{color:var(--gold);}
.ni{font-size:22px;}
.nl{font-size:10px;font-weight:500;}

.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(80px + var(--sb));scrollbar-width:none;}
.view::-webkit-scrollbar{display:none;}
.view.on{display:block;}
.vtitle{font-family:"Playfair Display",serif;font-size:20px;color:var(--tx);margin-bottom:16px;}

/* MODAL */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;align-items:flex-end;}
.ovl.on{display:flex;}
.mdl{background:var(--surf);border:1px solid var(--bdr);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(20px + var(--sb));animation:sup .28s ease;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhdl{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 18px;}
.mtitle{font-family:"Playfair Display",serif;font-size:19px;color:var(--gold);margin-bottom:16px;}

.gw{position:relative;margin-bottom:8px;}
.gico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--tx3);pointer-events:none;}
.ginp{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:12px 16px 12px 38px;color:var(--tx);font-size:16px;font-family:"DM Sans",sans-serif;outline:none;transition:border-color .2s;}
.ginp:focus{border-color:var(--gold);}
.gsp{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--tx3);display:none;}
.gsp.v{display:block;animation:spin 1s linear infinite;}

.gdrop{background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;max-height:240px;overflow-y:auto;margin-bottom:12px;display:none;scrollbar-width:none;}
.gdrop::-webkit-scrollbar{display:none;}
.gdrop.on{display:block;}
.gitem{display:flex;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background .1s;align-items:center;}
.gitem:last-child{border-bottom:none;}
.gitem:active{background:var(--surf3);}
.gicover{width:36px;height:52px;border-radius:4px;background:var(--surf);border:1px solid var(--bdr);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx3);}
.gicover img{width:100%;height:100%;object-fit:cover;display:block;}
.giinfo{flex:1;min-width:0;}
.gititle{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gimeta{font-size:11px;color:var(--tx2);margin-top:2px;}
.gisrc{font-size:10px;color:var(--purple);margin-top:2px;}

.dvd{text-align:center;color:var(--tx3);font-size:12px;margin:12px 0;position:relative;}
.dvd::before,.dvd::after{content:"";position:absolute;top:50%;width:44%;height:1px;background:var(--bdr);}
.dvd::before{left:0}.dvd::after{right:0}

.fg{margin-bottom:12px;}
.fl{font-size:11px;color:var(--tx2);margin-bottom:5px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.6px;}
.fi,.fs{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:11px 13px;color:var(--tx);font-size:15px;font-family:"DM Sans",sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.fi:focus,.fs:focus{border-color:var(--gold);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fs option{background:var(--surf);}

.stp{display:flex;gap:6px;margin-top:4px;}
.spstar{font-size:30px;color:var(--tx3);cursor:pointer;transition:color .1s;-webkit-user-select:none;user-select:none;}
.spstar.on{color:#f5c518;}

.sbtn{width:100%;background:var(--gold);border:none;border-radius:12px;padding:14px;color:#000;font-size:15px;font-weight:600;font-family:"DM Sans",sans-serif;cursor:pointer;margin-top:6px;transition:opacity .15s;}
.sbtn:active{opacity:.8;}
.cbtn{width:100%;background:transparent;border:1px solid var(--bdr);border-radius:12px;padding:12px;color:var(--tx2);font-size:14px;font-family:"DM Sans",sans-serif;cursor:pointer;margin-top:6px;}

/* RECS */
.rsec{margin-bottom:22px;}
.rhead{font-family:"Playfair Display",serif;font-size:16px;color:var(--gold);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr);}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center;}
.scn{font-family:"Playfair Display",serif;font-size:30px;}
.scl{font-size:11.5px;color:var(--tx2);margin-top:3px;}
.gbar{margin-bottom:9px;}
.gbl{font-size:12px;color:var(--tx2);margin-bottom:3px;display:flex;justify-content:space-between;}
.gbt{background:var(--surf2);border-radius:4px;height:5px;overflow:hidden;}
.gbf{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));border-radius:4px;transition:width .9s ease;}

.toast{position:fixed;top:calc(56px + var(--st));left:50%;transform:translateX(-50%) translateY(-70px);background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:9px 18px;font-size:13px;color:var(--tx);z-index:500;transition:transform .28s ease;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.toast.on{transform:translateX(-50%) translateY(0);}

.dsec{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px;}
</style>
</head>
<body>
<div id="app">

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">📚 Meine Bibliothek</div>
    <div class="hpill">Gelesen <b id="cnt-read">0</b></div>
    <div class="hpill">Lese <b id="cnt-reading">0</b></div>
  </div>
  <div class="sw">
    <span class="si">🔍</span>
    <input class="sinp" id="sinp" type="search" placeholder="Titel, Autor, Genre …" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="scl" id="scl">✕</button>
  </div>
</div>

<div class="fstrip" id="fstrip"></div>

<div class="stabs" id="stabs">
  <div class="stab on" data-tab="all">Alle <span class="tn" id="tn-all">668</span></div>
  <div class="stab" data-tab="want">Merkliste <span class="tn" id="tn-want">0</span></div>
  <div class="stab" data-tab="reading">Aktuell <span class="tn" id="tn-reading">0</span></div>
  <div class="stab" data-tab="read">Gelesen <span class="tn" id="tn-read">0</span></div>
</div>

<div class="lw" id="lw"><div class="ldg"><span class="spin">⟳</span> Lade …</div></div>
<div class="view" id="vRecs"></div>
<div class="view" id="vStats"></div>

<nav class="bnav">
  <button class="nb on" id="nb-list" onclick="showView('list')"><span class="ni">📖</span><span class="nl">Bibliothek</span></button>
  <button class="nb" id="nb-recs" onclick="showView('recs')"><span class="ni">✨</span><span class="nl">Für dich</span></button>
  <button class="nb" id="nb-add" onclick="openAdd()"><span class="ni">＋</span><span class="nl">Hinzufügen</span></button>
  <button class="nb" id="nb-stats" onclick="showView('stats')"><span class="ni">📊</span><span class="nl">Statistik</span></button>
</nav>
</div>

<!-- ADD MODAL -->
<div class="ovl" id="addOvl" onclick="bgClose(event)">
 <div class="mdl">
  <div class="mhdl"></div>
  <div class="mtitle">Buch hinzufügen</div>
  <div class="gw">
    <span class="gico">🔍</span>
    <input class="ginp" id="ginp" placeholder="Titel oder Autor suchen …" autocomplete="off" spellcheck="false">
    <span class="gsp" id="gsp">⟳</span>
  </div>
  <div class="gdrop" id="gdrop"></div>
  <div class="dvd">oder manuell</div>
  <div class="fg"><label class="fl">Titel *</label><input class="fi" id="f-title" placeholder="Titel eingeben"></div>
  <div class="fg"><label class="fl">Autor *</label><input class="fi" id="f-author" placeholder="Autor eingeben"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Jahr</label><input class="fi" id="f-year" type="number" placeholder="z.B. 2024"></div>
    <div class="fg"><label class="fl">Genre</label>
      <select class="fs" id="f-genre">
        <option>Thriller</option><option>Sci-Fi</option><option>Epen &amp; Universen</option>
        <option>Dark Romance</option><option>Erotic Thriller</option><option>LitRPG</option>
        <option>Gore &amp; Extreme Horror</option><option>Mindfuck</option><option>Dystopie</option>
        <option>Psychologie</option><option>Gesundheit</option><option>Kosmos-Astro</option>
        <option>Biografie-Memoiren</option><option>Business-Denken</option><option>Sonstiges</option>
      </select>
    </div>
  </div>
  <div class="fg"><label class="fl">Status</label>
    <select class="fs" id="f-status">
      <option value="read">✅ Gelesen</option>
      <option value="reading">📖 Lese gerade</option>
      <option value="want">🔖 Will lesen</option>
    </select>
  </div>
  <div class="fg">
    <label class="fl">Deine Bewertung</label>
    <div class="stp" id="stp">
      <span class="spstar" data-v="1">★</span><span class="spstar" data-v="2">★</span>
      <span class="spstar" data-v="3">★</span><span class="spstar" data-v="4">★</span>
      <span class="spstar" data-v="5">★</span>
    </div>
  </div>
  <div class="fg"><label class="fl">Notiz (optional)</label><input class="fi" id="f-note" placeholder="Eigene Gedanken …"></div>
  <button class="sbtn" onclick="saveBook()">Speichern</button>
  <button class="cbtn" onclick="closeAdd()">Abbrechen</button>
 </div>
</div>

<div class="toast" id="toast"></div>

function stars(n,small){const cls=small?"cstar":"exstar";let h="";for(let i=1;i<=5;i++)h+=`<span class="${cls}${i<=n?" on":""}">${i<=n?"★":"☆"}</span>`;return h;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

// ── GOOGLE BOOKS API ──────────────────────────────────────────────────────
async function gSearch(q){
  try{
    const r=await fetch("https://www.googleapis.com/books/v1/volumes?q="+encodeURIComponent(q)+"&maxResults=7&fields=items(id,volumeInfo(title,authors,publishedDate,description,imageLinks,categories))");
    if(!r.ok)return[];
    const d=await r.json();
    return(d.items||[]).map(item=>{
      const v=item.volumeInfo||{};
      return{gid:item.id,title:v.title||"",author:(v.authors||[]).join(", "),year:parseInt((v.publishedDate||"0").slice(0,4))||0,desc:v.description||"",cover:(v.imageLinks?.thumbnail||v.imageLinks?.smallThumbnail||"").replace("http://","https://"),genre:(v.categories||["Sonstiges"])[0]};
    });
  }catch(e){return[];}
}

async function fetchBookData(b){
  // Returns {desc, cover} from Google Books for a given book
  try{
    const r=await fetch("https://www.googleapis.com/books/v1/volumes?q="+encodeURIComponent(b.title+" "+b.author)+"&maxResults=1&fields=items(volumeInfo(description,imageLinks))");
    if(!r.ok)return null;
    const d=await r.json();
    const v=d?.items?.[0]?.volumeInfo;
    if(!v)return null;
    return{
      desc:v.description||null,
      cover:(v.imageLinks?.thumbnail||v.imageLinks?.smallThumbnail||"").replace("http://","https://")||null
    };
  }catch(e){return null;}
}

// ── COVER LOADING ─────────────────────────────────────────────────────────
function applyCover(id,url){
  if(!url)return;
  CV[id]=url;
  // update all img[data-cid] elements
  document.querySelectorAll("[data-cid='"+id+"']").forEach(img=>{
    img.src=url;img.style.display="block";
    const ph=img.previousElementSibling;
    if(ph&&ph.classList.contains("cph"))ph.style.display="none";
  });
}

async function loadCover(b){
  if(CV[b.id]){applyCover(b.id,CV[b.id]);return;}
  const data=await fetchBookData(b);
  if(data?.cover)applyCover(b.id,data.cover);
  if(data?.cover)save();
}

// ── FILTER + SORT ─────────────────────────────────────────────────────────
function filtered(){
  let books=allB();
  if(curG!=="all")books=books.filter(b=>b.genre===curG);
  if(curTab!=="all")books=books.filter(b=>bst(b)===curTab);
  if(q)books=books.filter(b=>b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||b.genre.toLowerCase().includes(q));
  const po={A:0,B:1,C:2},so={reading:0,want:1,read:3};
  books.sort((a,b)=>{const pa=po[a.prio]??1,pb=po[b.prio]??1;if(pa!==pb)return pa-pb;return(so[bst(a)]??2)-(so[bst(b)]??2);});
  return books;
}

function updCounts(){
  const all=allB(),read=all.filter(b=>bst(b)==="read").length,reading=all.filter(b=>bst(b)==="reading").length,want=all.filter(b=>bst(b)==="want").length;
  document.getElementById("cnt-read").textContent=read;
  document.getElementById("cnt-reading").textContent=reading;
  document.getElementById("tn-all").textContent=all.length;
  document.getElementById("tn-read").textContent=read;
  document.getElementById("tn-reading").textContent=reading;
  document.getElementById("tn-want").textContent=want;
}

  const isExp=openId===id;
  const isCustom=!!b.customId;
  const coverUrl=CV[id]||"";

  const smallCover=`<div class="cv">${coverUrl?`<img src="${esc(coverUrl)}" data-cid="${esc(id)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block">`:`<span class="cph">📖</span><img src="" data-cid="${esc(id)}" loading="lazy" style="display:none;width:100%;height:100%;object-fit:cover">`}</div>`;

  // Expanded section
  let expHTML="";
  if(isExp){
    const bigCover=`<div class="excv">${coverUrl?`<img src="${esc(coverUrl)}" data-cid="${esc(id)}" style="width:100%;height:100%;object-fit:cover">`:`<span id="eph-${esc(id)}">📖</span><img id="eimg-${esc(id)}" src="" data-cid="${esc(id)}" style="display:none;width:100%;height:100%;object-fit:cover">`}</div>`;
    expHTML=`<div class="cexp">
      <div class="ext">
        ${bigCover}
        <div class="exm">
          <div class="exmr"><b>${esc(b.author)}</b></div>
          ${b.year?`<div class="exmr">${b.year}</div>`:""}
          <div class="exmr">${gem(b.genre)} ${esc(b.genre)}</div>
          ${b.length?`<div class="exmr">${b.length==="kurz"?"📏 Kurz":b.length==="lang"?"📏 Lang":"📏 Mittel"}</div>`:""}
          <div class="exstars" onclick="event.stopPropagation()" id="estars-${esc(id)}">
            ${[1,2,3,4,5].map(i=>`<span class="exstar${i<=rating?" on":""}" onclick="setRating('${esc(id)}',${i})">${i<=rating?"★":"☆"}</span>`).join("")}
          </div>
        </div>
      </div>
      <div class="exdesc" id="edesc-${esc(id)}">${esc(b.desc)||"<em style='color:var(--tx3)'>Lade Beschreibung …</em>"}</div>
      ${b.why&&b.why!==b.desc?`<div class="exwhy">${esc(b.why)}</div>`:""}
      <div class="acts">
        <button class="abt r${status==="read"?" on":""}" onclick="setSt(event,'${esc(id)}','read')">✅ Gelesen</button>
        <button class="abt g${status==="reading"?" on":""}" onclick="setSt(event,'${esc(id)}','reading')">📖 Gerade</button>
        <button class="abt w${status==="want"?" on":""}" onclick="setSt(event,'${esc(id)}','want')">🔖 Merken</button>
      </div>
    </div>`;
  }

  return`<div class="bc${status?" s-"+status:""}${isCustom?" custom":""}${isExp?" exp":""}" data-id="${esc(id)}" onclick="tap('${esc(id)}')">
  <div class="cr">
    ${smallCover}
    <div class="ci">
      <div class="ct">${esc(b.title)}</div>
      <div class="ca">${esc(b.author)}${b.year?" · "+b.year:""}</div>

        ${b.prio==="B"?'<span class="bdg bb">B</span>':""}

</div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  if(curView!=="list")return;
  updCounts();
  const books=filtered();
  const el=document.getElementById("lw");
  if(!books.length){el.innerHTML=`<div class="empty"><div class="emico">📭</div><div class="emtxt">Keine Bücher gefunden.</div></div>`;return;}
  el.innerHTML=books.map(b=>cardHTML(b)).join("");
  // Apply cached covers immediately
  books.forEach(b=>{if(CV[b.id])applyCover(b.id,CV[b.id]);});
  // Lazy load covers for visible books
  books.slice(0,15).forEach(b=>{if(!CV[b.id])loadCover(b);});
}

// ── TAP HANDLER ───────────────────────────────────────────────────────────
function tap(id){
  // id is already a string, openId is string or null — no type mismatch possible
  if(openId===id){openId=null;render();return;}
  openId=id;render();
  setTimeout(()=>{const el=document.querySelector("[data-id='"+id+"']");if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"});},60);
  // Load full description asynchronously — does NOT block card opening
  loadFullDesc(id);
}

async function loadFullDesc(id){
  const descEl=document.getElementById("edesc-"+id);
  if(!descEl)return;
  const b=BMAP.get(id)||CUSTOM.find(b=>b.id===id);
  if(!b)return;
  // Only fetch if still showing placeholder
  if(!descEl.querySelector("em")&&descEl.textContent.length>50)return;
  try{
    const data=await fetchBookData(b);
    if(!data)return;
    const el=document.getElementById("edesc-"+id);
    if(el&&data.desc){el.innerHTML=esc(data.desc);}
    if(data.cover&&!CV[id]){
      applyCover(id,data.cover);save();
    }
  }catch(e){}
}

// ── STATUS + RATING ───────────────────────────────────────────────────────
function setSt(e,id,status){
  e.stopPropagation();
  if(ST[id]===status)delete ST[id];else ST[id]=status;
  save();render();updCounts();
  const lbl={read:"Als gelesen markiert ✅",reading:"Lese gerade 📖",want:"Gemerkt 🔖"};
  toast(ST[id]?lbl[status]:"Status entfernt");
  if(curView==="recs")buildRecs();
  if(curView==="stats")buildStats();
}

function setRating(id,val){
  if(RT[id]===val)delete RT[id];else RT[id]=val;
  save();
  const n=RT[id]||0;
  // Update expanded stars without full re-render
  const row=document.getElementById("estars-"+id);
  if(row)row.innerHTML=[1,2,3,4,5].map(i=>`<span class="exstar${i<=n?" on":""}" onclick="setRating('${esc(id)}',${i})">${i<=n?"★":"☆"}</span>`).join("");
  // Update small stars in card
  const card=document.querySelector("[data-id='"+id+"'] .cstars");
  if(card)card.innerHTML=n>0?stars(n,true):"";
}

// ── VIEW SWITCHING ────────────────────────────────────────────────────────
function showView(v){
  curView=v;
  document.getElementById("lw").style.display=v==="list"?"":"none";
  document.getElementById("fstrip").style.display=v==="list"?"":"none";
  document.getElementById("stabs").style.display=v==="list"?"":"none";
  ["Recs","Stats"].forEach(n=>{document.getElementById("v"+n).classList.toggle("on",v===n.toLowerCase());});
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));
  document.getElementById("nb-"+v)?.classList.add("on");
  if(v==="list")render();
  if(v==="recs")buildRecs();
  if(v==="stats")buildStats();
}

// ── RECS ─────────────────────────────────────────────────────────────────
function buildRecs(){
  const read=BOOKS.filter(b=>ST[b.id]==="read"||ST[b.id]==="reading");
  if(!read.length){document.getElementById("vRecs").innerHTML=`<div class="empty"><div class="emico">✨</div><div class="emtxt">Markiere Bücher als gelesen,<br>um Empfehlungen zu erhalten.</div></div>`;return;}
  const gc={};read.forEach(b=>{gc[b.genre]=(gc[b.genre]||0)+1;});
  const topG=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  const rIds=new Set(read.map(b=>b.id));
  const wIds=new Set(BOOKS.filter(b=>ST[b.id]==="want").map(b=>b.id));
  let html="";
  const top=BOOKS.filter(b=>b.prio==="A"&&topG.includes(b.genre)&&!rIds.has(b.id)&&!wIds.has(b.id)).slice(0,6);
  if(top.length)html+=rsec("🎯 Perfekt für dich",top);
  topG.slice(0,2).forEach(g=>{const gr=BOOKS.filter(b=>b.genre===g&&!rIds.has(b.id)&&!wIds.has(b.id)).sort((a,b)=>(b.impact||0)-(a.impact||0)).slice(0,4);if(gr.length)html+=rsec(gem(g)+" Mehr "+g,gr);});
  const otherG=[...new Set(BOOKS.map(b=>b.genre))].filter(g=>!topG.includes(g));
  const disc=BOOKS.filter(b=>otherG.includes(b.genre)&&b.prio==="A"&&!rIds.has(b.id)).sort((a,b)=>(b.impact||0)-(a.impact||0)).slice(0,4);
  if(disc.length)html+=rsec("🎲 Neues entdecken",disc);
  document.getElementById("vRecs").innerHTML=html;
}
function rsec(title,books){return`<div class="rsec"><div class="rhead">${title}</div>${books.map(b=>`<div class="bc${bst(b)?" s-"+bst(b):""}" onclick="qMark('${b.id}')"><div class="cr"><div class="cv">${CV[b.id]?`<img src="${esc(CV[b.id])}" style="width:100%;height:100%;object-fit:cover;display:block">`:`<span>📖</span>`}</div><div class="ci"><div class="ct">${esc(b.title)}</div><div class="ca">${esc(b.author)}</div><div class="cbdg"><span class="bdg bg">${gem(b.genre)} ${esc(b.genre)}</span>${b.prio==="A"?'<span class="bdg ba">A</span>':""}</div><div style="font-size:11.5px;color:var(--tx2);margin-top:6px;line-height:1.5">${esc(b.why||"")}</div></div><div class="csi">${bst(b)?SIC[bst(b)]:"🔖"}</div></div></div>`).join("")}</div>`;}
function qMark(id){if(!ST[id]){ST[id]="want";save();toast("Gemerkt 🔖");updCounts();buildRecs();}else{showView("list");setTimeout(()=>{openId=id;render();},80);}}

// ── STATS ─────────────────────────────────────────────────────────────────
function buildStats(){
  const all=allB(),read=all.filter(b=>bst(b)==="read"),reading=all.filter(b=>bst(b)==="reading"),want=all.filter(b=>bst(b)==="want");
  const gc={};read.forEach(b=>{gc[b.genre]=(gc[b.genre]||0)+1;});
  const topG=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,8);const mx=topG[0]?.[1]||1;
  const rated=all.filter(b=>brt(b)>0);
  const avgR=rated.length?(Math.round(rated.reduce((s,b)=>s+brt(b),0)/rated.length*10)/10):0;
  document.getElementById("vStats").innerHTML=`<div class="vtitle">Deine Bibliothek</div>
<div class="sg">
  <div class="sc"><div class="scn">${all.length}</div><div class="scl">Bücher gesamt</div></div>
  <div class="sc"><div class="scn" style="color:var(--green)">${read.length}</div><div class="scl">Gelesen</div></div>
  <div class="sc"><div class="scn" style="color:var(--gold)">${reading.length}</div><div class="scl">Lese gerade</div></div>
  <div class="sc"><div class="scn" style="color:var(--blue)">${want.length}</div><div class="scl">Will lesen</div></div>
  ${avgR?`<div class="sc"><div class="scn" style="color:#f5c518">${avgR}★</div><div class="scl">Ø Bewertung</div></div>`:""}
  ${CUSTOM.length?`<div class="sc"><div class="scn" style="color:var(--purple)">${CUSTOM.length}</div><div class="scl">Eigene Bücher</div></div>`:""}
</div>
${topG.length?`<div class="vtitle" style="font-size:16px;margin-bottom:12px">Gelesen nach Genre</div>${topG.map(([g,n])=>`<div class="gbar"><div class="gbl"><span>${gem(g)} ${g}</span><span style="color:var(--gold)">${n}</span></div><div class="gbt"><div class="gbf" style="width:${Math.round(n/mx*100)}%"></div></div></div>`).join("")}`:""}`;
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────
function openAdd(){
  document.getElementById("addOvl").classList.add("on");
  ["ginp","f-title","f-author","f-year","f-note"].forEach(id=>{document.getElementById(id).value="";});
  document.getElementById("gdrop").classList.remove("on");
  document.getElementById("gdrop").innerHTML="";
  document.getElementById("f-status").value="read";
  fRating=0;pGBook=null;pLocalId=null;updStp(0);
}
function closeAdd(){document.getElementById("addOvl").classList.remove("on");}
function bgClose(e){if(e.target===document.getElementById("addOvl"))closeAdd();}

// Star picker
document.getElementById("stp").addEventListener("click",e=>{
  const s=e.target.closest(".spstar");if(!s)return;
  const v=parseInt(s.dataset.v);fRating=fRating===v?0:v;updStp(fRating);
});
function updStp(v){document.querySelectorAll(".spstar").forEach((s,i)=>s.classList.toggle("on",i<v));}

// Google Books live search
document.getElementById("ginp").addEventListener("input",function(){
  clearTimeout(gTimer);
  const val=this.value.trim();
  if(val.length<3){document.getElementById("gdrop").classList.remove("on");return;}
  document.getElementById("gsp").classList.add("v");
  gTimer=setTimeout(async()=>{
    // Search both local DB and Google Books simultaneously
    const [gbResults]=await Promise.all([gSearch(val)]);
    gResults=gbResults;
    document.getElementById("gsp").classList.remove("v");
    renderDrop(gbResults,val);
  },400);
});

function renderDrop(gbRes,val){
  const dd=document.getElementById("gdrop");
  const localHits=BOOKS.filter(b=>b.title.toLowerCase().includes(val.toLowerCase())||b.author.toLowerCase().includes(val.toLowerCase())).slice(0,4);
  let html="";
  if(localHits.length){
    html+=`<div class="dsec">In deiner Bibliothek</div>`;
    html+=localHits.map(b=>{
      const coverUrl=CV[b.id]||"";
      const status=bst(b);
      return`<div class="gitem" onclick="selLocal('${esc(b.id)}')">
        <div class="gicover">${coverUrl?`<img src="${esc(coverUrl)}" style="width:100%;height:100%;object-fit:cover">`:"📖"}</div>
        <div class="giinfo"><div class="gititle">${esc(b.title)}${status?" "+SIC[status]:""}</div><div class="gimeta">${esc(b.author)}${b.year?" · "+b.year:""}</div><div class="gisrc">📚 In deiner Liste</div></div>
      </div>`;
    }).join("");
  }
  if(gbRes.length){
    html+=`<div class="dsec">Google Books</div>`;
    html+=gbRes.map((b,i)=>`<div class="gitem" onclick="selG(${i})">
      <div class="gicover">${b.cover?`<img src="${esc(b.cover)}" style="width:100%;height:100%;object-fit:cover">`:"📖"}</div>
      <div class="giinfo"><div class="gititle">${esc(b.title)}</div><div class="gimeta">${esc(b.author)}${b.year?" · "+b.year:""}</div><div class="gisrc">🌐 Google Books</div></div>
    </div>`).join("");
  }
  if(!html){dd.classList.remove("on");return;}
  dd.innerHTML=html;dd.classList.add("on");
}

function selLocal(id){
  const b=BMAP.get(id);if(!b)return;
  document.getElementById("gdrop").classList.remove("on");
  document.getElementById("ginp").value=b.title;
  document.getElementById("f-title").value=b.title;
  document.getElementById("f-author").value=b.author;
  document.getElementById("f-year").value=b.year||"";
  document.getElementById("f-genre").value=b.genre;
  pLocalId=id;pGBook=null;
  toast(`"${b.title}" ausgewählt`);
}

function selG(i){
  const b=gResults[i];if(!b)return;
  document.getElementById("gdrop").classList.remove("on");
  document.getElementById("ginp").value=b.title;
  document.getElementById("f-title").value=b.title;
  document.getElementById("f-author").value=b.author;
  document.getElementById("f-year").value=b.year||"";
  pGBook=b;pLocalId=null;
  toast(`"${b.title}" ausgewählt`);
}

function saveBook(){
  const title=document.getElementById("f-title").value.trim();
  const author=document.getElementById("f-author").value.trim();
  if(!title||!author){toast("Titel und Autor erforderlich");return;}
  const status=document.getElementById("f-status").value;
  const year=parseInt(document.getElementById("f-year").value)||0;
  const genre=document.getElementById("f-genre").value;
  const note=document.getElementById("f-note").value.trim();

  // Local DB book selected or typed
  if(pLocalId){
    ST[pLocalId]=status;if(fRating)RT[pLocalId]=fRating;if(note)NT[pLocalId]=note;
    save();toast(`"${title}" gespeichert`);closeAdd();render();updCounts();return;
  }
  // Check if matches local DB
  const ex=BOOKS.find(b=>b.title.toLowerCase()===title.toLowerCase()&&b.author.toLowerCase()===author.toLowerCase());
  if(ex){
    ST[ex.id]=status;if(fRating)RT[ex.id]=fRating;if(note)NT[ex.id]=note;
    save();toast(`"${title}" gespeichert`);closeAdd();render();updCounts();return;
  }
  // New custom book
  const cid="c"+Date.now();
  CUSTOM.push({id:cid,customId:cid,title,author,year,category:"Fiction",genre,readability:3,impact:3,length:"mittel",explicit:0,window:"abends",desc:pGBook?.desc||note||"",why:"Eigenes Buch",prio:"B"});
  if(pGBook?.cover)CV[cid]=pGBook.cover;
  ST[cid]=status;if(fRating)RT[cid]=fRating;if(note)NT[cid]=note;
  save();toast(`"${title}" hinzugefügt ✅`);closeAdd();render();updCounts();
}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
buildFilters();
render();
updCounts();
// Background cover preload for top Prio-A books
setTimeout(()=>{
  BOOKS.filter(b=>b.prio==="A"&&!CV[b.id]).slice(0,40).forEach((b,i)=>setTimeout(()=>loadCover(b),i*250));
},2000);
</script>
